<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Léo Gillet's Website</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="images/favicon.ico" />
    <script data-ad-client="ca-pub-7309294819772741" async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://code.jquery.com/jquery-3.4.1.js"></script>
</head>
<body>
    <div class="menu-container">
        <div class="button">
            Menu
            <span class="fas fa-bars"></span>
        </div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact & Feedback</a></li>
        </ul>
    </div>
    <script>
        $(document).ready(function(){
            $('.button').click(function(){
                if($(this).hasClass('expand')){
                    $('ul').slideUp(function(){
                        $('.button').removeClass('expand');
                        $('.fas').removeClass('expand')
                    });
                }else{
                    $(this).addClass('expand');
                    setTimeout(function(){
                        $('.fas').addClass('expand');
                        $('ul').stop().slideDown();
                    },200);
                }
            });
        });
    </script>
    <div class="main-container">
        <div class="wrapper">
            <div class="logo">
                <img width=396 src="images/small_black.gif" id="imglogo" alt="" />
            </div>
            <div class="social-icons">
                <a href="https://github.com/LeoGillet" target="_blank" rel="noopener noreferrer">
                    <img width="32" height="32" src="images/github.svg" alt="">
                </a>
                <a href="https://twitter.com/LeoGiIIet" target="_blank" rel="noopener noreferrer">
                    <img width="32" height="32" src="images/twitter.svg" alt="">
                </a>
                <a href="https://www.linkedin.com/in/leogillet/" target="_blank" rel="noopener noreferrer">
                    <img width="32" height="32"  src="images/linkedin.svg" alt="">
                </a>
                <a href="https://www.youtube.com/channel/UC-e2OoMAHEsA2egfWY74q5g" target="_blank" rel="noopener noreferrer">
                    <img width="32" height="32"  src="images/youtube.svg" alt="">
                </a>
                <a href="https://vps.leogillet.com/filegator/" target="_blank" rel="noopener noreferrer">
                    <img height="32" src="images/filegator_logo.png" alt="">
                </a>
                <a href="https://vps.leogillet.com/mcstatus/" target="_blank" rel="noopener noreferrer">
                    <img width="32" src="images/minecraft-logo.png" alt="">
                </a>
            </div>
        </div>
    </div>

    <div class="footer-container">
        <div class="wrapper">
            <footer>
                <div class="footer-content">
                    <p>
                        Site en construction <br>
                        Réalisé par Léo Gillet - 2021
                    </p>
                </div>
            </footer>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
